<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Crèche">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Crèche — Zélie</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #f5f5f7;
      --card: #ffffff;
      --text: #1d1d1f;
      --text2: #6e6e73;
      --accent: #007aff;
      --green: #34c759;
      --orange: #ff9500;
      --red: #ff3b30;
      --border: #e5e5ea;
      --nav-h: 56px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .app { display: flex; flex-direction: column; height: 100%; }

    /* ── Views ── */
    .view {
      display: none;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 16px calc(var(--nav-h) + var(--safe-bottom) + 16px);
    }
    .view.active { display: block; }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-top: calc(var(--safe-top) + 8px);
    }

    /* ── Bottom nav ── */
    .nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-bottom);
      z-index: 100;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      color: var(--text2);
      font-size: 10px;
      padding: 6px 0;
      transition: color .15s;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item svg { width: 24px; height: 24px; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }

    /* ── Alert strip ── */
    .alert {
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .alert.green  { background: #d4f5de; color: #1a6b35; }
    .alert.orange { background: #fff2d4; color: #7a4800; }
    .alert.red    { background: #ffd6d6; color: #7a0000; }

    /* ── Row ── */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .row:last-child { border-bottom: none; }
    .row-label { font-size: 15px; color: var(--text2); }
    .row-value { font-size: 15px; font-weight: 500; }

    /* ── Badge view ── */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 8px 0 24px;
    }
    svg.qr {
      width: 75vw; height: 75vw;
      max-width: 280px; max-height: 280px;
      shape-rendering: crispEdges;
    }
    .next-label {
      font-size: 15px;
      color: var(--text2);
      text-align: center;
    }
    .badge-btn {
      display: block;
      box-sizing: border-box;
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-size: 17px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      background: var(--accent);
      color: white;
      transition: opacity .15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .badge-btn:active { opacity: .75; }
    .badge-btn:disabled,
    .badge-btn.is-disabled { background: var(--border); color: var(--text2); cursor: default; pointer-events: none; }
    /* Switch caché servant uniquement au retour haptique iOS 17.4+ */
    .haptic-switch { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; margin: 0; }

    .badge-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .badge-entry:last-child { border-bottom: none; }
    .badge-type-lbl { font-size: 15px; color: var(--text2); }
    .badge-time-val { font-size: 17px; font-weight: 600; }
    /* Heure éditable : vrai input time transparent superposé pour ouvrir les rouleaux iOS */
    .badge-time-edit { position: relative; display: inline-flex; align-items: center; }
    .badge-time-edit .badge-time-val { text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 3px; }
    .badge-time-edit input[type=time] {
      position: absolute; inset: 0; width: 100%; height: 100%;
      opacity: 0; border: none; padding: 0; margin: 0; cursor: pointer;
      -webkit-appearance: none; appearance: none;
    }

    /* ── Summary cells ── */
    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .sum-cell {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 8px;
      text-align: center;
    }
    .sum-val { font-size: 19px; font-weight: 700; }
    .sum-lbl { font-size: 12px; color: var(--text2); margin-top: 3px; }

    /* ── Histo ── */
    .seg-ctrl {
      display: flex;
      background: var(--border);
      border-radius: 10px;
      padding: 2px;
      margin-bottom: 16px;
    }
    .seg-btn {
      flex: 1;
      text-align: center;
      padding: 7px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: var(--text2);
      transition: background .15s, color .15s;
    }
    .seg-btn.active { background: white; color: var(--text); }

    .hrow {
      display: grid;
      grid-template-columns: 68px 1fr 1fr 52px;
      gap: 2px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
      font-size: 13px;
    }
    .hrow:last-child { border-bottom: none; }
    .hrow.hdr { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; }
    .hrow > div:not(:first-child) { text-align: right; }
    .pos { color: var(--orange); }
    .neg { color: var(--green); }

    /* ── Réglages ── */
    .user-row {
      display: flex;
      gap: 10px;
    }
    .user-btn {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: var(--card);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .user-btn.active { border-color: var(--accent); color: var(--accent); }

    .cedit-row {
      display: grid;
      grid-template-columns: 76px 1fr 1fr;
      gap: 8px;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .cedit-row:last-child { border-bottom: none; }
    .day-lbl { font-size: 15px; font-weight: 500; }
    .time-inp {
      padding: 8px 4px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 15px;
      text-align: center;
      width: 100%;
      background: var(--bg);
    }
    .save-btn {
      width: 100%;
      padding: 14px;
      border-radius: 13px;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
    }
    .save-btn:active { opacity: .8; }

    .loading { text-align: center; color: var(--text2); padding: 40px 16px; font-size: 15px; }
    .empty   { text-align: center; color: var(--text2); padding: 20px 16px; font-size: 15px; }
  </style>
</head>

  { jour:5, heure_arrivee:'10:00', heure_depart:'18:15' },
];

let currentUser = localStorage.getItem('creche_user');
let contrat = [];
let histoTab = 'semaine';
let ovTodayState = null; // override du jour (fermé/absent/manuel), pour la page Badge

// ── Supabase REST ─────────────────────────────────────────────
const H = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

async function sbGet(table, q='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}${q}`, { headers: H });
  return r.json();
}
async function sbPost(table, data) {
  return fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST', headers:{...H,'Prefer':'return=representation'}, body:JSON.stringify(data)
  }).then(r=>r.json());
}
async function sbUpsert(table, data) {
  return fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST', headers:{...H,'Prefer':'resolution=merge-duplicates,return=representation'}, body:JSON.stringify(data)
  }).then(r=>r.json());
}
async function sbPatch(table, q, data) {
  return fetch(`${SB_URL}/rest/v1/${table}${q}`, {
    method:'PATCH', headers:{...H,'Prefer':'return=representation'}, body:JSON.stringify(data)
  }).then(r=>r.json());
}
async function sbDelete(table, q) {
  return fetch(`${SB_URL}/rest/v1/${table}${q}`, {
    method:'DELETE', headers: H
  });
}

// ── Helpers ───────────────────────────────────────────────────
const fmt = ts => new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
const t2m = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
const m2hm = m => { const abs=Math.round(Math.abs(m)); return `${Math.floor(abs/60)}h${String(abs%60).padStart(2,'0')}`; };

// Toujours travailler en date locale (évite le décalage UTC qui fait apparaître le dimanche)
function localDateStr(d=new Date()) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const today = () => localDateStr();

// Minuit local (du jour) converti en ISO/UTC — pour filtrer les badges « d'aujourd'hui »
// sans rater ceux badgés entre minuit et 2h locale (qui sont la veille en UTC).
function dayStartISO() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  return d.toISOString();
}

// Convertit un timestamp Supabase (UTC) en date locale YYYY-MM-DD
function tsToLocalDate(ts) {
  return localDateStr(new Date(ts));
}

function dowISO(date) {
  // 1=Mon … 5=Fri, 0=weekend — en heure locale
  const d = (typeof date==='string' ? new Date(date+'T12:00:00') : new Date(date)).getDay();
  if (d===0||d===6) return 0;
  return d;
}

function weekStart(date=new Date()) {
  const d = new Date(date);
  d.setDate(d.getDate() - ((d.getDay()+6)%7));
  d.setHours(0,0,0,0);
  return d;
}

// ── Saisons (années scolaires : septembre → août) ─────────────
function saisonForDate(date = new Date()) {
  const d = (typeof date === 'string') ? new Date(date + 'T12:00:00') : new Date(date);
  const y = d.getFullYear();
  const start = (d.getMonth() + 1) >= 9 ? y : y - 1; // septembre = mois 9
  return `${start}-${start + 1}`;
}
function nextSaison(s) {
  const a = parseInt(s.split('-')[1], 10);
  return `${a}-${a + 1}`;
}
function saisonBounds(s) {
  const a = parseInt(s.split('-')[0], 10);
  return { start: new Date(a, 8, 1, 0, 0, 0), end: new Date(a + 1, 7, 31, 23, 59, 59) }; // 1 sept → 31 août
}
// Début réel de comptabilisation : si l'app a été mise en place après le début de saison
// (config.debut_compta = date ISO), on ne compte pas avant. Sans effet les saisons suivantes.
function effectiveStart(seasonStart) {
  const dc = appConfig.debut_compta;
  if (!dc) return seasonStart;
  const d = new Date(dc + 'T00:00:00');
  return d > seasonStart ? d : seasonStart;
}
// Contrat applicable à une date (bon jour de semaine + bonne saison)
function contratDay(date) {
  const dow = dowISO(date);
  if (!dow) return null;
  const s = saisonForDate(date);
  return contrat.find(r => r.jour === dow && (r.saison === s || r.saison == null)) || null;
}

// ── Config partagée (mode + saison courante), stockée dans Supabase ──
let appConfig = { mode: 'actif', saison: saisonForDate() };
async function loadConfig() {
  const rows = await sbGet('config', '');
  if (Array.isArray(rows)) rows.forEach(r => { appConfig[r.cle] = r.valeur; });
  return appConfig;
}
async function setConfig(cle, valeur) {
  appConfig[cle] = valeur;
  await sbUpsert('config', { cle, valeur });
}

// ── Calcul d'une journée (source unique, partagée Historique + Bilan) ──
function dayTally(date, byDate, ovByDate) {
  const c = contratDay(date);
  const contratMins = c ? t2m(c.heure_depart) - t2m(c.heure_arrivee) : 0;
  const ov = ovByDate[date];
  let entreeReel = '–', sortieReel = '–', reelMins = null, delta = null, type = 'normal';
  if (ov?.type === 'ferme') {
    type = 'ferme';
  } else if (ov?.type === 'absent') {
    type = 'absent';
    entreeReel = c?.heure_arrivee ?? '–'; sortieReel = c?.heure_depart ?? '–';
    reelMins = contratMins; delta = 0;
  } else if (ov?.type === 'manuel') {
    type = 'manuel';
    entreeReel = ov.heure_entree; sortieReel = ov.heure_sortie;
    reelMins = t2m(ov.heure_sortie) - t2m(ov.heure_entree); delta = reelMins - contratMins;
  } else {
    const allB = byDate[date] ?? [];
    entreeReel = allB.length >= 1 ? fmt(allB[0].timestamp) : '–';
    sortieReel = allB.length >= 2 ? fmt(allB[allB.length - 1].timestamp) : '–';
    if (allB.length >= 2) {
      reelMins = Math.round((new Date(allB[allB.length - 1].timestamp) - new Date(allB[0].timestamp)) / 60000);
      delta = reelMins - contratMins;
    }
  }
  return { c, contratMins, ov, type, entreeReel, sortieReel, reelMins, delta };
}

// Totaux sur une liste de jours (mêmes règles que l'historique)
function tallyTotals(days, byDate, ovByDate) {
  let totalContrat = 0, totalReel = 0, nbJours = 0;
  days.forEach(date => {
    const t = dayTally(date, byDate, ovByDate);
    if (t.type === 'ferme') return;      // jour fermé exclu
    totalContrat += t.contratMins;
    if (t.reelMins !== null) { totalReel += t.reelMins; nbJours++; }
  });
  return { totalContrat, totalReel, ecart: totalReel - totalContrat, nbJours };
}

// Jours ouvrés (lun–ven) entre deux dates incluses
function weekdaysBetween(start, end) {
  const days = [];
  const cur = new Date(start); cur.setHours(12, 0, 0, 0);
  const last = new Date(end); last.setHours(23, 59, 59, 999);
  while (cur <= last) {
    if (cur.getDay() >= 1 && cur.getDay() <= 5) days.push(localDateStr(cur));
    cur.setDate(cur.getDate() + 1);
  }
  return days;
}

// ── Accueil ───────────────────────────────────────────────────
async function renderAccueil() {
  const el = document.getElementById('accueil-content');
  el.innerHTML = '<div class="loading">Chargement…</div>';

  const now = new Date();
  const dow = dowISO(now);

  const [ctData, badges, ovRows] = await Promise.all([
    sbGet('contrat','?order=jour'),
    sbGet('badges',`?timestamp=gte.${dayStartISO()}&order=timestamp`),
    sbGet('overrides',`?date=eq.${today()}`)
  ]);
  contrat = ctData;
  const ovToday = (Array.isArray(ovRows) && ovRows.length) ? ovRows[0] : null;

  let html = '';

  // ── Bloc contrat du jour ──
  if (dow === 0) {
    html += '<div class="card"><p class="empty">Week-end 🎉</p></div>';
  } else {
    const c = contratDay(now);
    if (c) {
      const arrMin = t2m(c.heure_arrivee), depMin = t2m(c.heure_depart);
      const nowMin = now.getHours()*60 + now.getMinutes();
      const duree = depMin - arrMin;

      html += `<div class="card">
        <div class="card-title">Contrat — ${JOURS[dow-1]}</div>
        <div class="row"><span class="row-label">Entrée prévue</span><span class="row-value">${c.heure_arrivee}</span></div>
        <div class="row"><span class="row-label">Sortie prévue</span><span class="row-value">${c.heure_depart}</span></div>
        <div class="row"><span class="row-label">Durée</span><span class="row-value">${m2hm(duree)}</span></div>
      </div>`;
    }
  }

  // ── Jour marqué (fermé/absent/manuel) → carte info à la place des badges ──
  if (ovToday) {
    html += overrideCard(ovToday);
  } else {
    html += `<div class="card"><div class="card-title">Badges aujourd'hui</div>`;
    if (badges.length === 0) {
      html += '<div class="empty">Aucun badge pour l\'instant</div>';
    } else {
      badges.forEach((b, i) => {
        const type = i === 0 ? 'Entrée' : 'Sortie';
        html += `<div class="badge-entry">
          <div>
            <div style="font-size:15px;font-weight:500">${b.utilisateur}</div>
            <div class="badge-type-lbl">${type}</div>
          </div>
          <div class="badge-time-val">${fmt(b.timestamp)}</div>
        </div>`;
      });
    }
    html += '</div>';
  }

  // ── Bilan du jour si entrée + sortie enregistrées ──
  if (badges.length >= 2 && dow !== 0) {
    const c = contratDay(now);
    if (c) {
      const reelMins   = Math.round((new Date(badges[badges.length-1].timestamp) - new Date(badges[0].timestamp)) / 60000);
      const contratMins = t2m(c.heure_depart) - t2m(c.heure_arrivee);
      const delta       = reelMins - contratMins;
      const dCls        = delta > 5 ? 'color:var(--orange)' : delta < -5 ? 'color:var(--green)' : 'color:var(--text)';
      const dSign       = delta >= 0 ? '+' : '-';
      html += `<div class="card">
        <div class="card-title">Bilan du jour</div>
        <div class="row"><span class="row-label">Temps réel</span><span class="row-value">${m2hm(reelMins)}</span></div>
        <div class="row"><span class="row-label">Temps contrat</span><span class="row-value">${m2hm(contratMins)}</span></div>
        <div class="row"><span class="row-label">Écart</span><span class="row-value" style="${dCls}">${dSign}${m2hm(Math.abs(delta))}</span></div>
      </div>`;
    }
  }
  el.innerHTML = html;
}

// ── Prochain jour ouvré ──────────────────────────────────────
function nextWeekdayDate(from) {
  const d = new Date(from);
  do { d.setDate(d.getDate() + 1); } while (d.getDay() === 0 || d.getDay() === 6);
  return d;
}
function nextWeekdayDow(from) { return nextWeekdayDate(from).getDay(); }

// ── Cache localStorage ────────────────────────────────────────
function cacheSet(key, data) {
  try { localStorage.setItem(key, JSON.stringify({ d: data, t: Date.now() })); } catch {}
}
function cacheGet(key, maxAgeMs = 60000) {
  try {
    const v = JSON.parse(localStorage.getItem(key));
    if (v && Date.now() - v.t < maxAgeMs) return v.d;
  } catch {}
  return null;
}

// ── Badge ─────────────────────────────────────────────────────
// Carte affichée sur la page Badge quand la journée est marquée manuellement
function overrideCard(ov) {
  const map = {
    ferme:  { emoji:'🔒', titre:'Crèche fermée', sous:'Journée non comptabilisée.' },
    absent: { emoji:'🏠', titre:"Absent aujourd'hui", sous:'Journée comptée selon le contrat.' },
    manuel: { emoji:'✏️', titre:'Horaires saisis', sous:`Entrée ${ov.heure_entree} · Sortie ${ov.heure_sortie}` },
  };
  const m = map[ov.type] || map.manuel;
  return `<div class="card" style="text-align:center;padding:28px 20px">
    <div style="font-size:48px;line-height:1;margin-bottom:10px">${m.emoji}</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:4px">${m.titre}</div>
    <div style="color:var(--text2);font-size:15px">${m.sous}</div>
  </div>`;
}

async function renderBadge(fromCache = false) {
  document.getElementById('badge-title').textContent = currentUser ? `Bonjour ${currentUser} 👋` : 'Bonjour 👋';
  const btn     = document.getElementById('badge-btn');
  const alertEl = document.getElementById('badge-alert');
  const todayEl = document.getElementById('badge-today');

  // Réinitialiser dès le début pour éviter toute accumulation
  alertEl.innerHTML = '';
  todayEl.innerHTML = '';

  if (!currentUser) {
    btn.classList.add('is-disabled');
    return;
  }

  // ── Mode vacances : on masque le QR/badge et on affiche l'écran de vacances ──
  const activeZone = document.getElementById('badge-active-zone');
  const vacZone    = document.getElementById('vacances-zone');
  if (appConfig.mode === 'vacances') {
    activeZone.style.display = 'none';
    vacZone.style.display = 'block';
    const prochaine = nextSaison(appConfig.saison);
    vacZone.innerHTML = `
      <div class="card" style="text-align:center;padding:32px 20px">
        <div style="font-size:56px;line-height:1;margin-bottom:12px">☀️</div>
        <div style="font-size:22px;font-weight:700;margin-bottom:6px">Bonnes vacances !</div>
        <div style="color:var(--text2);font-size:15px;margin-bottom:24px">L'année ${appConfig.saison} est clôturée.<br>Le badgeage reprendra à la rentrée.</div>
        <button class="badge-btn" onclick="preparerNouvelleSaison()">Préparer l'année ${prochaine}</button>
      </div>`;
    return;
  }
  activeZone.style.display = '';
  vacZone.style.display = 'none';

  // Jour marqué manuellement (fermé / absent / manuel) : on garde le QR,
  // mais on affichera l'entrée du prochain jour ouvré plutôt que le rappel du jour.
  const ovKey = `ov_${today()}`;
  let ovCached = cacheGet(ovKey, 60000);
  if (ovCached === null) {
    const rows = await sbGet('overrides', `?date=eq.${today()}`);
    ovCached = (Array.isArray(rows) && rows.length) ? rows[0] : 'none';
    cacheSet(ovKey, ovCached);
  }
  ovTodayState = ovCached !== 'none' ? ovCached : null;

  // Contrat : cache 24h (change rarement)
  if (contrat.length === 0) {
    contrat = cacheGet('contrat', 86400000) ?? [];
    if (contrat.length === 0) {
      contrat = await sbGet('contrat','?order=jour');
      cacheSet('contrat', contrat);
    }
  }

  // Badges du jour : affichage immédiat depuis cache (max 30s), puis rafraîchissement réseau
  const cacheKey = `badges_${today()}`;
  let allBadges = cacheGet(cacheKey, 30000) ?? [];
  const hasCache = allBadges.length > 0 || localStorage.getItem(cacheKey);

  if (!hasCache) {
    // Pas de cache : attendre le réseau normalement
    allBadges = await sbGet('badges', `?timestamp=gte.${dayStartISO()}&order=timestamp`);
    cacheSet(cacheKey, allBadges);
  } else {
    // Affichage immédiat avec cache, rafraîchissement en arrière-plan
    renderBadgeContent(allBadges, contrat, btn, alertEl, todayEl);
    sbGet('badges', `?timestamp=gte.${dayStartISO()}&order=timestamp`).then(fresh => {
      cacheSet(cacheKey, fresh);
      if (JSON.stringify(fresh) !== JSON.stringify(allBadges))
        renderBadgeContent(fresh, contrat, btn, alertEl, todayEl);
    });
    return;
  }

  renderBadgeContent(allBadges, contrat, btn, alertEl, todayEl);
}

function renderBadgeContent(allBadges, contrat, btn, alertEl, todayEl) {
  // Mes badges uniquement pour l'affichage
  const myBadges = allBadges.filter(b => b.utilisateur === currentUser);

  // Index global de chaque badge (1er = Entrée, 2e = Sortie)
  const globalIdx = {};
  allBadges.forEach((b, i) => { globalIdx[b.id] = i; });

  btn.classList.remove('is-disabled');
  btn.textContent = 'Je badge';

  // ── Bandeau heure prévue ──
  const now    = new Date();
  const dow    = dowISO(now);
  const c      = contratDay(now);
  const nowMin = now.getHours() * 60 + now.getMinutes();

  // Journée finie = 2 badges enregistrés, OU jour marqué (fermé/absent/manuel)
  // → dans les deux cas on affiche l'entrée du prochain jour ouvré.
  const journeeFinie = allBadges.length >= 2 || !!ovTodayState;

  if (dow === 0 || journeeFinie) {
    // Afficher l'entrée du prochain jour ouvré (contrat de sa saison)
    const nextDate = nextWeekdayDate(now);
    const nextDow  = nextDate.getDay();
    const cNext    = contratDay(nextDate);
    // "demain" uniquement si le lendemain calendaire est un jour ouvré
    const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
    const nextLabel = localDateStr(tomorrow) && nextDow === tomorrow.getDay()
      ? 'demain'
      : new Date(tomorrow.getFullYear(), tomorrow.getMonth(), tomorrow.getDate() + (nextDow - tomorrow.getDay() + 7) % 7)
          .toLocaleDateString('fr-FR', { weekday: 'long' });
    // Calcul simple : si demain est lundi-vendredi → "demain", sinon nom du jour
    const tomorrowDow = tomorrow.getDay();
    const jourLabel = (tomorrowDow >= 1 && tomorrowDow <= 5) ? 'demain' :
      ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'][nextDow];
    if (cNext) {
      alertEl.innerHTML = `<div class="alert green" style="margin-bottom:12px">
        Entrée prévue ${jourLabel} — <strong>${cNext.heure_arrivee}</strong>
      </div>`;
    }
  } else if (c) {
    const arrMin  = t2m(c.heure_arrivee);
    const depMin  = t2m(c.heure_depart);
    const label   = allBadges.length === 0 ? 'Entrée prévue' : 'Sortie prévue';
    const heure   = allBadges.length === 0 ? c.heure_arrivee : c.heure_depart;
    const diff    = (allBadges.length === 0 ? arrMin : depMin) - nowMin;
    // Vert > 20min, orange entre 20min et 0, rouge si dépassé
    const cls     = diff < 0 ? 'red' : diff <= 20 ? 'orange' : 'green';
    const diffTxt = diff > 0 ? `dans ${m2hm(diff)}` : `dépassée de ${m2hm(-diff)}`;
    alertEl.innerHTML = `<div class="alert ${cls}" style="justify-content:space-between;margin-bottom:12px">
      <span>${label} — <strong>${heure}</strong></span>
      <span>${diffTxt}</span>
    </div>`;
  }

  // ── Mes badges du jour ──
  if (myBadges.length > 0) {
    let html = '<div class="card"><div class="card-title">Mes badges aujourd\'hui</div>';
    myBadges.forEach(b => {
      const type = globalIdx[b.id] === 0 ? 'Entrée' : 'Sortie';
      const d = new Date(b.timestamp);
      const hm = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      html += `<div class="badge-entry">
        <span class="badge-type-lbl">${type}</span>
        <span style="display:flex;align-items:center;gap:12px">
          <span class="badge-time-edit">
            <span class="badge-time-val">${fmt(b.timestamp)}</span>
            <input type="time" value="${hm}" onchange="setBadgeTime('${b.id}','${b.timestamp}',this.value)">
          </span>
          <button onclick="deleteBadge('${b.id}')" style="border:none;background:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0;line-height:1">×</button>
        </span>
      </div>`;
    });
    todayEl.innerHTML = html + '</div>';
  }
} // fin renderBadgeContent

async function deleteBadge(id) {
  if (!confirm('Supprimer ce badge ?')) return;
  await sbDelete('badges', `?id=eq.${id}`);
  localStorage.removeItem(`badges_${today()}`);
  await renderBadge();
}

async function setBadgeTime(id, ts, value) {
  if (!value) return;
  const [h, m] = value.split(':').map(Number);
  const d = new Date(ts);
  d.setHours(h, m, 0, 0);
  await sbPatch('badges', `?id=eq.${id}`, { timestamp: d.toISOString() });
  localStorage.removeItem(`badges_${today()}`);
  await renderBadge();
}

let badging = false;

async function doBadge() {
  if (!currentUser || badging) return;
  // Le tap sur le label bascule le switch caché → retour haptique natif iOS 17.4+.
  // Android : API Vibration en complément.
  navigator.vibrate?.(50);
  badging = true;
  const btn = document.getElementById('badge-btn');

  const showErr = msg => {
    btn.textContent = msg;
    btn.style.background = 'var(--red)';
    setTimeout(() => {
      btn.textContent = 'Je badge';
      btn.style.background = '';
      btn.classList.remove('is-disabled');
    }, 3000);
  };

  try {
    // Vérifier le total des badges du jour (toutes personnes confondues)
    const existing = await sbGet('badges', `?timestamp=gte.${dayStartISO()}`);
    if (!Array.isArray(existing)) { showErr('⚠️ Connexion impossible, réessaie'); return; }
    if (existing.length >= 2) { showErr('⚠️ Entrée et sortie déjà enregistrées'); return; }

    btn.classList.add('is-disabled');
    btn.textContent = '…';
    const res = await sbPost('badges', { utilisateur: currentUser, timestamp: new Date().toISOString() });
    // Supabase renvoie un tableau des lignes créées en cas de succès, sinon un objet d'erreur
    if (!Array.isArray(res) || res.length === 0) { showErr('⚠️ Enregistrement échoué, réessaie'); return; }
    localStorage.removeItem(`badges_${today()}`);
    await renderBadge();
  } catch {
    showErr('⚠️ Pas de connexion, réessaie');
  } finally {
    badging = false;
  }
}

let histoOffset = 0; // 0 = période courante, négatif = passé (semaines/mois)

function setHistoTab(tab, el) {
  histoTab = tab;
  histoOffset = 0; // on repart sur la période courante à chaque changement d'onglet
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderHistorique();
}

function histoNav(delta) {
  histoOffset = Math.min(0, histoOffset + delta); // jamais dans le futur
  renderHistorique();
}

let saisonSelectionnee = null; // saison affichée dans l'onglet Année (null = courante)

async function renderHistorique() {
  const el = document.getElementById('histo-content');
  el.innerHTML = '<div class="loading">Chargement…</div>';

  if (histoTab === 'annee') { await renderSaison(el); return; }

  const now = new Date();
  let start, end, periodLabel;
  if (histoTab === 'semaine') {
    start = weekStart(now); start.setDate(start.getDate() + histoOffset * 7);
    end   = new Date(start); end.setDate(end.getDate() + 6); end.setHours(23,59,59,999);
    const vendredi = new Date(start); vendredi.setDate(vendredi.getDate() + 4);
    periodLabel = histoOffset === 0 ? 'Cette semaine'
      : `${start.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})} – ${vendredi.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}`;
  } else {
    start = new Date(now.getFullYear(), now.getMonth() + histoOffset, 1);
    end   = new Date(start.getFullYear(), start.getMonth() + 1, 0, 23,59,59,999);
    periodLabel = histoOffset === 0 ? 'Ce mois'
      : start.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  }
  const last = end < now ? end : now; // ne pas compter le futur

  const [ctData, badges, overrides] = await Promise.all([
    sbGet('contrat','?order=jour'),
    sbGet('badges', `?timestamp=gte.${start.toISOString()}&timestamp=lte.${end.toISOString()}&order=timestamp`),
    sbGet('overrides', `?date=gte.${localDateStr(start)}&date=lte.${localDateStr(end)}&order=date`)
  ]);
  contrat = ctData;

  // Index badges by local date
  const byDate = {};
  badges.forEach(b => {
    const d = tsToLocalDate(b.timestamp);
    (byDate[d] ??= []).push(b);
  });
  byDate && Object.keys(byDate).forEach(d => byDate[d].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)));

  // Index overrides by date
  const ovByDate = {};
  overrides.forEach(o => { ovByDate[o.date] = o; });

  // Jours ouvrés de la période (jusqu'à aujourd'hui pour la période courante)
  const days = weekdaysBetween(start, last);

  // Peut-on reculer encore ? (pas avant la mise en place de l'app)
  const dc = appConfig.debut_compta ? new Date(appConfig.debut_compta + 'T00:00:00') : null;
  const floor = !dc ? null : (histoTab === 'semaine'
    ? weekStart(dc)
    : new Date(dc.getFullYear(), dc.getMonth(), 1));
  const canPrev = !floor || start > floor;

  let totalContrat = 0, totalReel = 0;
  const PILLS = {
    ferme:  '<span style="font-size:11px;background:#e5e5ea;color:#6e6e73;padding:2px 8px;border-radius:20px;font-weight:600">FERMÉ</span>',
    absent: '<span style="font-size:11px;background:#fff2d4;color:#7a4800;padding:2px 8px;border-radius:20px;font-weight:600">ABSENT</span>',
    manuel: '<span style="font-size:11px;background:#e8f4fd;color:#0056b3;padding:2px 8px;border-radius:20px;font-weight:600">MANUEL</span>',
  };

  const cards = days.map(date => {
    const { c, contratMins, ov, type, entreeReel, sortieReel, reelMins, delta } = dayTally(date, byDate, ovByDate);
    if (type !== 'ferme') {
      totalContrat += contratMins;
      if (reelMins !== null) totalReel += reelMins;
    }
    const dayLabel = new Date(date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
    const badge    = PILLS[type] || '';

    const dStyle   = delta === null ? '' : delta > 5 ? 'color:var(--orange);font-weight:600' : delta < -5 ? 'color:var(--green);font-weight:600' : '';
    const deltaStr = delta !== null ? (delta >= 0 ? '+' : '-') + m2hm(Math.abs(delta)) : '–';
    const safeDate = date.replace(/-/g,'_');

    return `<div class="card" style="margin-bottom:10px" id="card-${safeDate}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-size:15px;font-weight:600;text-transform:capitalize">${dayLabel} ${badge}</div>
        <button onclick="toggleEditor('${date}')" style="border:none;background:none;font-size:18px;cursor:pointer;color:var(--text2);padding:0 0 0 8px">✏️</button>
      </div>
      <div id="editor-${safeDate}" style="display:none"></div>
      ${ov?.type === 'ferme' ? `<div class="empty" style="padding:8px 0">Journée non comptabilisée</div>` : `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:12px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">
        <div></div><div style="text-align:center">Prévu</div><div style="text-align:center">Réel</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:13px;color:var(--text2)">Entrée</div>
        <div style="text-align:center;font-size:15px">${c ? c.heure_arrivee : '–'}</div>
        <div style="text-align:center;font-size:15px;font-weight:500">${entreeReel}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:13px;color:var(--text2)">Sortie</div>
        <div style="text-align:center;font-size:15px">${c ? c.heure_depart : '–'}</div>
        <div style="text-align:center;font-size:15px;font-weight:500">${sortieReel}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;align-items:center;padding:6px 0">
        <div style="font-size:13px;color:var(--text2)">Durée</div>
        <div style="text-align:center;font-size:15px">${c ? m2hm(contratMins) : '–'}</div>
        <div style="text-align:center;font-size:15px;font-weight:600;${dStyle}">${reelMins !== null ? m2hm(reelMins) : '–'}${deltaStr !== '–' ? ' <span style="font-size:12px">('+deltaStr+')</span>' : ''}</div>
      </div>`}
    </div>`;
  });

  const globalDelta = totalReel - totalContrat;
  const gCls  = globalDelta > 0 ? 'pos' : globalDelta < 0 ? 'neg' : '';
  const gSign = globalDelta >= 0 ? '+' : '-';

  const navBtn = 'width:38px;height:38px;border:none;border-radius:10px;background:var(--card);font-size:18px;cursor:pointer;color:var(--text)';
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button style="${navBtn}${canPrev ? '' : ';opacity:.3;pointer-events:none'}" onclick="histoNav(-1)">◀</button>
      <span style="font-size:15px;font-weight:600;text-transform:capitalize">${periodLabel}</span>
      <button style="${navBtn}${histoOffset < 0 ? '' : ';opacity:.3;pointer-events:none'}" onclick="histoNav(1)">▶</button>
    </div>`;
  html += `<div class="summary-grid">
    <div class="sum-cell"><div class="sum-val">${m2hm(totalContrat)}</div><div class="sum-lbl">Contrat</div></div>
    <div class="sum-cell"><div class="sum-val">${totalReel > 0 ? m2hm(totalReel) : '–'}</div><div class="sum-lbl">Réel</div></div>
    <div class="sum-cell"><div class="sum-val ${gCls}">${totalReel > 0 ? gSign + m2hm(Math.abs(globalDelta)) : '–'}</div><div class="sum-lbl">Écart</div></div>
  </div>`;
  html += cards.length ? cards.join('') : '<div class="card"><div class="empty">Aucun jour sur cette période</div></div>';
  el.innerHTML = html;
}

// ── Résumé d'une saison (année scolaire) ──────────────────────
function changeSaison(val) { saisonSelectionnee = val; renderHistorique(); }

async function renderSaison(el) {
  // Charger contrat, bilans figés et config en parallèle
  const [ctData, bilans] = await Promise.all([
    sbGet('contrat', '?order=jour'),
    sbGet('bilans', '?order=saison.desc')
  ]);
  contrat = ctData;

  // Saisons disponibles : celles ayant un contrat, un bilan, + la saison courante
  const set = new Set();
  (Array.isArray(ctData) ? ctData : []).forEach(r => r.saison && set.add(r.saison));
  (Array.isArray(bilans) ? bilans : []).forEach(b => set.add(b.saison));
  set.add(appConfig.saison || saisonForDate());
  const saisons = [...set].sort().reverse();

  const selected = saisonSelectionnee && saisons.includes(saisonSelectionnee)
    ? saisonSelectionnee
    : (saisons.includes(appConfig.saison) ? appConfig.saison : saisons[0]);

  const { start, end } = saisonBounds(selected);
  const now  = new Date();
  const last = end < now ? end : now;             // ne pas compter le futur
  const effStart = effectiveStart(start);          // ni avant la mise en place de l'app

  const [badges, overrides] = await Promise.all([
    sbGet('badges', `?timestamp=gte.${effStart.toISOString()}&timestamp=lte.${end.toISOString()}&order=timestamp`),
    sbGet('overrides', `?date=gte.${localDateStr(effStart)}&date=lte.${localDateStr(end)}&order=date`)
  ]);

  const byDate = {};
  badges.forEach(b => { const d = tsToLocalDate(b.timestamp); (byDate[d] ??= []).push(b); });
  Object.keys(byDate).forEach(d => byDate[d].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)));
  const ovByDate = {};
  overrides.forEach(o => { ovByDate[o.date] = o; });

  const days  = weekdaysBetween(effStart, last);
  const total = tallyTotals(days, byDate, ovByDate);
  const gCls  = total.ecart > 0 ? 'pos' : total.ecart < 0 ? 'neg' : '';
  const gSign = total.ecart >= 0 ? '+' : '-';

  // Découpage par mois (septembre → août)
  const moisRows = [];
  for (let i = 0; i < 12; i++) {
    const my = start.getFullYear() + (8 + i >= 12 ? 1 : 0);
    const mm = (8 + i) % 12; // 8=septembre … puis rotation
    const mStart = new Date(my, mm, 1);
    const mEnd   = new Date(my, mm + 1, 0, 23, 59, 59);
    const s = mStart < effStart ? effStart : mStart;
    const e = mEnd   < last     ? mEnd     : last;
    if (s > e) continue;
    const mDays = weekdaysBetween(s, e);
    const mt = tallyTotals(mDays, byDate, ovByDate);
    if (mt.totalContrat === 0 && mt.totalReel === 0) continue;
    const mLabel = mStart.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    const eSign  = mt.ecart >= 0 ? '+' : '-';
    const eCls   = mt.ecart > 5 ? 'color:var(--orange)' : mt.ecart < -5 ? 'color:var(--green)' : 'color:var(--text2)';
    moisRows.push(`<div class="row" style="align-items:baseline">
      <span class="row-label" style="text-transform:capitalize">${mLabel}</span>
      <span class="row-value">${m2hm(mt.totalReel)} <span style="font-size:12px;${eCls}">(${eSign}${m2hm(Math.abs(mt.ecart))})</span></span>
    </div>`);
  }

  const bilan = (Array.isArray(bilans) ? bilans : []).find(b => b.saison === selected);
  const clotureNote = bilan
    ? `<div class="empty" style="padding:8px 0 0">Année clôturée le ${new Date(bilan.cloture_le).toLocaleDateString('fr-FR')}</div>`
    : '';
  // Note si la comptabilisation démarre après le début de saison (mise en place de l'app)
  const comptaNote = effStart > start
    ? `<div class="empty" style="padding:8px 0 0">📱 Comptabilisation depuis la mise en place de l'app, le ${effStart.toLocaleDateString('fr-FR')}</div>`
    : '';

  const options = saisons.map(s =>
    `<option value="${s}" ${s===selected?'selected':''}>Année ${s}</option>`).join('');

  el.innerHTML = `
    <div class="card" style="padding:10px 12px;margin-bottom:12px">
      <select onchange="changeSaison(this.value)" style="width:100%;border:none;background:none;font-size:16px;font-weight:600;color:var(--text);padding:6px 2px">
        ${options}
      </select>
    </div>
    <div class="summary-grid">
      <div class="sum-cell"><div class="sum-val">${m2hm(total.totalContrat)}</div><div class="sum-lbl">Contrat</div></div>
      <div class="sum-cell"><div class="sum-val">${total.totalReel > 0 ? m2hm(total.totalReel) : '–'}</div><div class="sum-lbl">Réel</div></div>
      <div class="sum-cell"><div class="sum-val ${gCls}">${total.totalReel > 0 ? gSign + m2hm(Math.abs(total.ecart)) : '–'}</div><div class="sum-lbl">Écart</div></div>
    </div>
    <div class="card">
      <div class="card-title">Détail par mois</div>
      ${moisRows.length ? moisRows.join('') : '<div class="empty">Aucune donnée pour cette année</div>'}
      <div class="row" style="border-top:2px solid var(--border);margin-top:6px;padding-top:10px">
        <span class="row-label" style="font-weight:700;color:var(--text)">Total — ${total.nbJours} jours</span>
        <span class="row-value" style="font-weight:700">${total.totalReel > 0 ? m2hm(total.totalReel) : '–'}</span>
      </div>
      ${comptaNote}
      ${clotureNote}
    </div>`;
}

// ── Éditeur de jour ───────────────────────────────────────────
function toggleEditor(date) {
  const safeDate = date.replace(/-/g,'_');
  const el = document.getElementById(`editor-${safeDate}`);
  if (!el) return;
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }

  const c = contratDay(date);
  el.style.display = 'block';
  el.innerHTML = `
    <div style="border-top:1px solid var(--border);padding:12px 0;margin-bottom:8px">
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button onclick="setEditorType('${date}','manuel')" id="et-manuel-${safeDate}"
          style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;cursor:pointer">✏️ Manuel</button>
        <button onclick="setEditorType('${date}','absent')" id="et-absent-${safeDate}"
          style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;cursor:pointer">🏠 Absent</button>
        <button onclick="setEditorType('${date}','ferme')" id="et-ferme-${safeDate}"
          style="flex:1;padding:8px 4px;border-radius:10px;border:2px solid var(--border);background:var(--bg);font-size:13px;font-weight:500;cursor:pointer">🔒 Fermé</button>
      </div>
      <div id="et-times-${safeDate}" style="display:none;margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:13px;color:var(--text2);width:60px">Entrée</span>
          <input type="time" id="et-in-${safeDate}" value="${c?.heure_arrivee ?? ''}"
            style="border:none;background:none;font-size:17px;font-weight:500;color:var(--text);text-align:right;padding:0">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
          <span style="font-size:13px;color:var(--text2);width:60px">Sortie</span>
          <input type="time" id="et-out-${safeDate}" value="${c?.heure_depart ?? ''}"
            style="border:none;background:none;font-size:17px;font-weight:500;color:var(--text);text-align:right;padding:0">
        </div>

      <div style="display:flex;gap:8px">

          style="flex:1;padding:10px;border-radius:10px;border:none;background:var(--accent);color:white;font-size:15px;font-weight:600;cursor:pointer;opacity:.4">Enregistrer</button>
        <button onclick="deleteOverride('${date}')"
          style="padding:10px 14px;border-radius:10px;border:none;background:var(--border);color:var(--text2);font-size:15px;cursor:pointer">🗑</button>
      </div>
    </div>`;
}

let editorType = {};
function setEditorType(date, type) {
  const safeDate = date.replace(/-/g,'_');
  editorType[date] = type;
  ['manuel','absent','ferme'].forEach(t => {
    const btn = document.getElementById(`et-${t}-${safeDate}`);
    if (btn) btn.style.borderColor = t === type ? 'var(--accent)' : 'var(--border)';
  });
  const times = document.getElementById(`et-times-${safeDate}`);
  if (times) times.style.display = type === 'manuel' ? 'block' : 'none';
  const save = document.getElementById(`et-save-${safeDate}`);
  if (save) { save.disabled = false; save.style.opacity = '1'; }
}

async function saveOverride(date) {
  const safeDate = date.replace(/-/g,'_');
  const type = editorType[date];
  if (!type) return;
  const data = { date, type };
  if (type === 'manuel') {
    data.heure_entree = document.getElementById(`et-in-${safeDate}`).value;
    data.heure_sortie = document.getElementById(`et-out-${safeDate}`).value;
    if (!data.heure_entree || !data.heure_sortie) return;
  }
  const btn = document.getElementById(`et-save-${safeDate}`);
  btn.textContent = '…';
  await sbUpsert('overrides', data);
  localStorage.removeItem(`ov_${date}`); // maj immédiate de la page Badge
  delete editorType[date];
  renderHistorique();
}

async function deleteOverride(date) {
  await sbDelete('overrides', `?date=eq.${date}`);
  localStorage.removeItem(`ov_${date}`);
  delete editorType[date];
  renderHistorique();
}

// ── Réglages ──────────────────────────────────────────────────
let editingSaison = null; // saison éditée dans Réglages (null = saison courante)

async function renderReglages() {
  ['Bertrand','Cyrielle'].forEach(n => {
    document.getElementById('btn-'+n).classList.toggle('active', currentUser===n);
  });

  if (contrat.length === 0) {
    contrat = await sbGet('contrat','?order=jour') || [];
  }

  const editing  = editingSaison || appConfig.saison || saisonForDate();
  const nouvelle = editing !== (appConfig.saison || saisonForDate());

  document.getElementById('contract-title').textContent = `Contrat hebdomadaire — ${editing}`;

  // Bannière si on prépare une nouvelle saison
  document.getElementById('contract-banner').innerHTML = nouvelle
    ? `<div class="alert green" style="margin-bottom:12px">🎒 Nouveaux horaires pour l'année <strong>${editing}</strong>. Enregistre pour démarrer l'année.</div>`
    : '';

  // Pré-remplissage : contrat de la saison éditée, sinon celui de la saison précédente, sinon défaut
  const rowsFor = s => (Array.isArray(contrat) ? contrat.filter(r => r.saison === s) : []);
  const source  = rowsFor(editing).length ? rowsFor(editing)
                : rowsFor(appConfig.saison).length ? rowsFor(appConfig.saison)
                : DEFAULT_CONTRAT;

  const el = document.getElementById('contract-editor');
  el.innerHTML = JOURS.map((nom, i) => {
    const c = source.find(r => r.jour === i+1) ?? DEFAULT_CONTRAT[i];
    return `<div class="cedit-row">
      <div class="day-lbl">${nom}</div>
      <input class="time-inp" type="time" id="arr-${i+1}" value="${c.heure_arrivee}" title="Entrée">
      <input class="time-inp" type="time" id="dep-${i+1}" value="${c.heure_depart}" title="Sortie">
    </div>`;
  }).join('');

  // Zone de fin d'année (clôture / état vacances)
  const cz = document.getElementById('cloture-zone');
  if (appConfig.mode === 'vacances') {
    cz.innerHTML = `
      <div class="empty" style="padding:4px 0 12px">L'année ${appConfig.saison} est clôturée (mode vacances).</div>
      <button class="save-btn" style="background:var(--border);color:var(--text)" onclick="annulerCloture()">Annuler la clôture</button>`;
  } else {
    cz.innerHTML = `
      <div class="empty" style="padding:4px 0 12px">Clôture l'année ${appConfig.saison} : enregistre un bilan figé et passe l'app en mode vacances jusqu'à la rentrée.</div>
      <button class="save-btn" style="background:var(--red)" onclick="cloturerAnnee()">Clôturer l'année ${appConfig.saison}</button>`;
  }
}

function setUser(name) {
  currentUser = name;
  localStorage.setItem('creche_user', name);
  ['Bertrand','Cyrielle'].forEach(n => {
    document.getElementById('btn-'+n).classList.toggle('active', n===name);
  });
}

async function saveContract() {
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Enregistrement…';
  btn.disabled = true;

  const editing = editingSaison || appConfig.saison || saisonForDate();
  const rows = JOURS.map((_,i) => ({
    saison: editing,
    jour: i+1,
    heure_arrivee: document.getElementById(`arr-${i+1}`).value,
    heure_depart:  document.getElementById(`dep-${i+1}`).value,
  }));

  await sbUpsert('contrat', rows);
  contrat = await sbGet('contrat','?order=jour') || [];
  localStorage.removeItem('contrat'); // invalide le cache badge

  // Si on démarrait une nouvelle saison → elle devient la saison courante, fin des vacances
  const nouvelle = editing !== (appConfig.saison || saisonForDate());
  if (nouvelle) {
    await setConfig('saison', editing);
    if (appConfig.mode === 'vacances') await setConfig('mode', 'actif');
    editingSaison = null;
    saisonSelectionnee = null;
    btn.textContent = '✓ Année démarrée';
    setTimeout(() => { btn.textContent = 'Enregistrer'; btn.disabled = false; showView('badge'); }, 1200);
    return;
  }

  btn.textContent = '✓ Enregistré';
  setTimeout(() => { btn.textContent = 'Enregistrer'; btn.disabled = false; }, 2000);
}

// ── Clôture / reprise d'année ─────────────────────────────────
async function seasonTotals(saison) {
  const { start, end } = saisonBounds(saison);
  const now = new Date();
  const last = end < now ? end : now;
  const effStart = effectiveStart(start);
  const [badges, overrides] = await Promise.all([
    sbGet('badges', `?timestamp=gte.${effStart.toISOString()}&timestamp=lte.${end.toISOString()}&order=timestamp`),
    sbGet('overrides', `?date=gte.${localDateStr(effStart)}&date=lte.${localDateStr(end)}&order=date`)
  ]);
  const byDate = {}; badges.forEach(b => { const d=tsToLocalDate(b.timestamp); (byDate[d] ??= []).push(b); });
  Object.keys(byDate).forEach(d => byDate[d].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)));
  const ovByDate = {}; overrides.forEach(o => { ovByDate[o.date] = o; });
  return tallyTotals(weekdaysBetween(effStart, last), byDate, ovByDate);
}

async function cloturerAnnee() {
  const s = appConfig.saison;
  if (!confirm(`Clôturer l'année ${s} ?\nUn bilan sera enregistré et l'app passera en mode vacances.`)) return;
  if (contrat.length === 0) contrat = await sbGet('contrat','?order=jour') || [];
  const t = await seasonTotals(s);
  await sbUpsert('bilans', {
    saison: s,
    total_contrat_min: t.totalContrat,
    total_reel_min: t.totalReel,
    ecart_min: t.ecart,
    nb_jours: t.nbJours,
    cloture_le: new Date().toISOString(),
  });
  await setConfig('mode', 'vacances');
  alert(`Année ${s} clôturée ✅\nRéel : ${m2hm(t.totalReel)} · Écart : ${t.ecart>=0?'+':'-'}${m2hm(Math.abs(t.ecart))}`);
  renderReglages();
}

async function annulerCloture() {
  await setConfig('mode', 'actif');
  renderReglages();
}

function preparerNouvelleSaison() {
  editingSaison = nextSaison(appConfig.saison);
  showView('reglages');
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  const [ct] = await Promise.all([ sbGet('contrat','?order=jour'), loadConfig() ]);
  contrat = ct || [];
  if (!appConfig.saison) appConfig.saison = saisonForDate();
  if (!currentUser) {
    showView('reglages');
  } else {
    renderBadge();
  }
}

init();

// Service worker : app en cache pour un démarrage instantané
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
